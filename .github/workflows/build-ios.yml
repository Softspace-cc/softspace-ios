name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json

      # 1. Build Client Web Assets
      - name: Install Client dependencies
        run: |
          cd client
          npm install --ignore-scripts

      - name: Build Web Client
        run: |
          cd client
          npm run build

      # 2. Setup iOS Project
      - name: Install iOS App dependencies
        run: |
          cd "ios app"
          npm install

      - name: Install Capacitor iOS Platform
        run: |
          cd "ios app"
          npx cap add ios

      - name: Copy & Sync Web Assets
        run: |
          cd "ios app"
          npx cap sync ios

      - name: Configure iOS Permissions & Sounds
        run: |
          plutil -replace NSMicrophoneUsageDescription -string "Softspace needs microphone access for voice calls." "ios app/ios/App/App/Info.plist"
          plutil -replace NSCameraUsageDescription -string "Softspace needs camera access for video and screen sharing." "ios app/ios/App/App/Info.plist"
          plutil -replace NSPhotoLibraryUsageDescription -string "Softspace needs access to your photo library to let you upload photos and media." "ios app/ios/App/App/Info.plist"
          plutil -replace NSPhotoLibraryAddUsageDescription -string "Softspace needs permission to save photos to your library." "ios app/ios/App/App/Info.plist"
          plutil -replace UIBackgroundModes -xml "<array><string>audio</string><string>voip</string><string>fetch</string><string>remote-notification</string></array>" "ios app/ios/App/App/Info.plist"
          gem install xcodeproj
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios app/ios/App/App.xcodeproj')
            target = project.targets.first
            group = project.main_group['App']
            require 'fileutils'
            FileUtils.cp('client/public/sounds/message.mp3', 'ios app/ios/App/App/message.mp3')
            FileUtils.cp('client/public/sounds/call_ring.mp3', 'ios app/ios/App/App/call_ring.mp3')
            file_ref1 = group.new_file('message.mp3')
            file_ref2 = group.new_file('call_ring.mp3')
            target.add_resources([file_ref1, file_ref2])
            project.save
          "

      # 3. Generate Assets (Icon/Splash)
      - name: Generate Mobile Assets
        run: |
          cd client
          node generate-mobile-assets.cjs
          cd "../ios app"
          npx capacitor-assets generate --ios

      # 4. Compile iOS Xcode project (creates unsigned IPA)
      - name: Build Xcode Workspace
        run: |
          cd "ios app/ios/App"
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive -archivePath build/App.xcarchive

      - name: Export Unsigned IPA
        run: |
          cd "ios app/ios/App"
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/Softspace.app
          zip -r Softspace.ipa Payload
          mv Softspace.ipa ../../../Softspace.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Softspace-iOS-Unsigned-IPA
          path: Softspace.ipa
          if-no-files-found: error
